name: train_EEMSAGANx4plus
model_type: RemoteSensingEEMSAGANModel
scale: 4
num_gpu: auto
manual_seed: 0
queue_size: 160
l1_gt_usm: False
percep_gt_usm: False
gan_gt_usm: False
edge_gt_usm: False

datasets:
  train:
    name: RemoteSensing
    type: RemoteSensingEEMSAGANDataset
    dataroot_gt: "datasets"
    meta_info: "datasets/meta_info/meta_info_RemoteSensing.txt"

    crop_size: 256
    use_hflip: True
    use_rot: True
    use_vflip: True

    degradation_params:
      blur:
        kernel_size: 11
        sig_min: 0.1
        sig_max: 1.2
        rate_iso: 0.9
      noise:
        variance_min: 0.0001
        variance_max: 0.0009
        amplitude: 1.0
        rate_cln: 0.4

    io_backend:
      type: disk

    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 16
    dataset_enlarge_ratio: 1
    prefetch_mode: cuda
    pin_memory: true

  val:
    name: RemoteSensing_Val
    type: PairedImageDataset
    dataroot_gt: "datasets/val_HR"
    dataroot_lq: "datasets/val_LR"

    use_hflip: False
    use_rot: False
    use_vflip: False

    io_backend:
      type: disk

network_g:
  type: EEMSANet
  num_in_ch: 3
  num_out_ch: 3
  num_feat: 64
  num_block: 12
  num_grow_ch: 32
  reduction: 4
  use_spatial: true

network_d:
  type: UNetDiscriminatorSN
  num_in_ch: 3
  num_feat: 64
  skip_connection: True

path:
  pretrain_network_g: ~
  param_key_g: params_ema
  strict_load_g: false
  resume_state: ~

train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]
  optim_d:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [100000]
    gamma: 0.5

  total_iter: 100000
  warmup_iter: -1

  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

  perceptual_opt:
    type: PerceptualLoss
    layer_weights:
      'conv1_2': 0.1
      'conv2_2': 0.1
      'conv3_4': 1
      'conv4_4': 1
      'conv5_4': 1
    vgg_type: vgg19
    use_input_norm: true
    perceptual_weight: 0.01
    style_weight: 0
    range_norm: false
    criterion: l1

  gan_opt:
    type: GANLoss
    gan_type: vanilla
    real_label_val: 1.0
    fake_label_val: 0.0
    loss_weight: 0.001

  edge_opt:
    type: RemoteSensingEdgeLoss
    scales: [ 1, 2, 4, 8 ]
    loss_type: l1
    loss_weight: 1.0
    normalized: true
    eps: !!float 1e-6
    use_diagonal: true
    edge_threshold: 0.1

  net_d_iters: 1
  net_d_init_iters: 0

val:
  val_freq: 1000
  save_img: true
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: false

logger:
  print_freq: 100
  save_checkpoint_freq: 1000
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29500
